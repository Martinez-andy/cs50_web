<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Image search</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="container">
            <ul class="nav justify-content-end">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Google Search</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"  href="advancedsearch.html">Advanced Search</a>
                </li>
            </ul>
        </div>
        <div class="main-search">
            <img id="image-logo" src="google_images_logo.png" alt="Google images logo">
        </div>
        <div class="image-search-bar">
            <form action="https://google.com/search">
                <div>
                    <input type="hidden" name="tbm" value="isch">
                    <input type="text" name="q" class="search form-group">
                </div>
                <div class="text-center">
                    <input type="submit" value="Google Search" class="form-group form-buttons">
                </div>
            </form>
        </div>
    </body>
</html>
