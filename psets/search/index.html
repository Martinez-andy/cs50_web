<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="container">
            <ul class="nav justify-content-end">
                <li class="nav-item">
                    <a class="nav-link" href="image.html">Google Images</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"  href="advancedsearch.htmtl">Advanced Search</a>
                </li>
            </ul>
        </div>
        <div class="main-search">
            <img src="google_logo.gif" alt="Google logo">
            <form action="https://google.com/search">
                <div>
                    <div class="input-group-prepend">
                        <i class="fa fa-search srchicon"></i>
                    </div>
                    <input type="text" name="q" class="search form-group">
                </div>
                <div class="text-center">
                    <input type="submit" value="Google Search" class="form-group form-buttons">
                    <input type="submit" name="btnI" value="I'm Felling Lucky" class="form-group form-buttons">
                </div>
            </form>
        </div>
    </body>
</html>
