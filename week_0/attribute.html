<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Style!</title>
        <style>
            a {
                color: blue;
            }

            a[href='https://amazon.com'] {
                color: green;
            }
        </style>
    </head>
    <body>
        <ul>
            <li><a href="https://google.com">Google</a></li>
            <li><a href="https://facebook.com">Facebook</a></li>
            <li><a href="https://amazon.com">Amazon</a></li>
        </ul>

    </body>
</html>
