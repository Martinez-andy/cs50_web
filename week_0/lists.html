<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Lists!</title>
    </head>
    <body>
        An Ordered list:
        <ol>
            <li>First item</li>
            <li>Second item</li>
            <li>Third Item</li>
        </ol>
        An Unordered List:
        <ul>
            <li>First Item</li>
            <li>Second Item</li>
            <li>Third Item</li>
        </ul>
    </body>
</html>
