<!DOCTYPE html>
<html lang="en">
    <head>
        <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
        <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
        <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
        <title>Counter</title>
    </head>
    <body>
        <div id="app"></div>

        <script type="text/babel">
            // Created an empty div

            // Create a function that returns hello in an h1
            function Hello(props) {
                return (
                    <h1>Hello, {props.name}!</h1>
                )
            }

            // When called this functions returns a div with the word hello in it
            function App() {
                
                const [state, setState] = React.useState({
                    num1: 3,
                    num2: 4,
                    resposne: "",
                    score: 0
                });

                function inputKeyPress(event) {
                    if (event.key === "Enter") {
                        const answer = parseInt(state.response);
                        if (state.num1 + state.num2 === answer) {
                            setState({
                                ...state,
                                score: state.score + 1
                            });
                        } else {
                            // user got the question wrong
                            setState({
                                ...state,
                                score: state.score - 1
                            })
                        }
                    }
                }

                function updateResponse(event) {
                    setState({
                        ...state,
                        response: event.target.value
                    });
                }

                return (
                    <div>
                        <div>{state.num1} + {state.num2}</div>
                        <input onKeyPress={inputKeyPress} onChange={updateResponse} value={state.response} />
                        <div>Score: {state.score}</div>
                    </div>
                );
            }
            // Uses react to render the app function (<App />) and in teh div with the id of app
            ReactDOM.render(<App />, document.querySelector('#app'));
        </script>
    </body>
</html>
